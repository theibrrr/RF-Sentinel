# RF-Sentinel ResNet1D Quick Test Configuration
# Small subset for rapid smoke testing / development

project:
  name: RF-Sentinel
  seed: 42
  output_dir: artifacts
  report_dir: reports/resnet1d_quick

data:
  dataset_path: data/raw/GOLD_XYZ_OSC.0001_1024.hdf5
  x_key: X
  y_key: Y
  snr_key: Z
  sample_length: 1024
  iq_channels: 2
  max_samples: 5000
  subset_fraction: null
  normalize: rms
  split_dir: data/splits
  reuse_splits: false

splits:
  train_size: 0.70
  val_size: 0.15
  test_size: 0.15
  stratify_by: label_snr
  random_seed: 42

model:
  type: resnet1d
  input_channels: 2
  num_classes: auto
  dropout: 0.20
  base_channels: 32
  blocks_per_stage: [1, 1, 1]

training:
  epochs: 2
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.00001
  optimizer: adam
  scheduler: reduce_on_plateau
  early_stopping_patience: 3
  num_workers: 0
  device: auto
  mixed_precision: false

evaluation:
  confidence_threshold: 0.70
  top_k: 3
  low_snr_max: 0
  high_snr_min: 12
  save_confusion_matrix: true
  save_snr_curve: true

mlflow:
  enabled: false
  tracking_uri: mlruns
  experiment_name: rf-sentinel-waveform-models
  run_name: resnet1d-quick
