# RF-Sentinel TCN1D / Dilated CNN Baseline Configuration
# Full training on RadioML 2018.01A

project:
  name: RF-Sentinel
  seed: 42
  output_dir: artifacts
  report_dir: reports/tcn1d

data:
  dataset_path: data/raw/GOLD_XYZ_OSC.0001_1024.hdf5
  x_key: X
  y_key: Y
  snr_key: Z
  sample_length: 1024
  iq_channels: 2
  max_samples: null
  subset_fraction: null
  normalize: rms
  split_dir: data/splits
  reuse_splits: true

splits:
  train_size: 0.70
  val_size: 0.15
  test_size: 0.15
  stratify_by: label_snr
  random_seed: 42

model:
  type: tcn1d
  input_channels: 2
  num_classes: auto
  dropout: 0.20
  base_channels: 64
  num_blocks: 5
  kernel_size: 5
  dilation_base: 2

training:
  epochs: 100
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  optimizer: adam
  scheduler: reduce_on_plateau
  early_stopping_patience: 7
  num_workers: 2
  device: auto
  mixed_precision: false

evaluation:
  confidence_threshold: 0.70
  top_k: 3
  low_snr_max: 0
  high_snr_min: 12
  save_confusion_matrix: true
  save_snr_curve: true

mlflow:
  enabled: true
  tracking_uri: mlruns
  experiment_name: rf-sentinel-waveform-models
  run_name: tcn1d-100-epochs
